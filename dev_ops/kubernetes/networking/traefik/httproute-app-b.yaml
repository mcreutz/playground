---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-b
  namespace: app-b
spec:
  # Attach to the websecure listener of the Gateway in the traefik namespace.
  parentRefs:
    - name: traefik
      namespace: traefik
      sectionName: websecure
  hostnames:
    - app-b.example.com
  rules:
    - backendRefs:
        - name: app-b
          port: 80
